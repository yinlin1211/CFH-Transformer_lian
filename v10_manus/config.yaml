# CFT v10_manus 配置文件
# 严格对照论文修复 v9_manus 的所有偏差
#
# v10_manus 修复：
#   [修复1] 所有 TransformerEncoder 补充 norm=nn.LayerNorm（修复 NaN 崩溃）
#   [修复2] HTTransformer 恢复论文设计：seq_len=H, d_model=T
#   [修复3] TFTransformer 恢复论文设计：seq_len=T, d_model=F，去掉升维投影
#   [修复4] 三个位置编码恢复论文完整维度：
#           E(t) ∈ R^{F×H}, H(f) ∈ R^{H×T}, T(h) ∈ R^{T×F}
#   [修复5] 删除 FHTransformer 多余的 freq_pe 和 TFTransformer 的分块代码

data:
  audio_dir: '/mnt/ssd/lian/论文复现/CFH-Transformer/vocal_mp3/'
  label_path: '/mnt/ssd/lian/论文复现/CFH-Transformer/MIR-ST500_corrected.json'
  splits_dir: /mnt/ssd/lian/论文复现/CFH-Transformer_v3/splits/
  cqt_cache_dir: '/mnt/ssd/lian/论文复现/CFH-Transformer/cqt_cache/npy/'
  sample_rate: 16000
  segment_frames: 256
  max_samples_per_epoch: 2000
  extra_train_splits: ['val']

audio:
  hop_length: 320
  cqt_bins: 288
  bins_per_octave: 48
  n_octaves: 6
  fmin: 48.9994

model:
  h_dim: 192              # H = 6 octaves × 32 channels = 192
  conv_channels: 32
  num_cycles: 2           # M = 2（循环次数）
  num_transformer_layers: 1  # 论文：each transformer uses only one encoder layer
  nhead_fh: 8             # FH: d_model=H=192, 192/8=24 per head
  nhead_ht: 8             # HT: d_model=T=256, 256/8=32 per head
  nhead_tf: 8             # TF: d_model=F=48, 48/8=6 per head
  dim_feedforward: 512
  dropout: 0.1
  num_pitches: 48

training:
  batch_size: 8           # 32GB GPU 安全值（TF Transformer B*H=8*192=1536 展开）
  num_workers: 4
  learning_rate: 0.0003   # 论文：Adam, lr=3e-4
  epochs: 1300
  run_dir: './run'
  save_every: 50
  grad_clip: 1.0
  warmup_epochs: 0

loss:
  onset_weight: 1.0
  offset_weight: 1.0
  frame_weight: 1.0
