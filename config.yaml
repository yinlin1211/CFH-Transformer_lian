data:
  audio_dir: "/root/CFT/vocal_mp3/"
  label_path: "/root/CFT/MIR-ST500_corrected.json"
  splits_dir: "/root/CFT/splits/"
  cqt_cache_dir: "/root/CFT/cqt_cache/npy/"
  sample_rate: 16000
  segment_frames: 256
  max_samples_per_epoch: 2000

audio:
  hop_length: 320
  cqt_bins: 288
  bins_per_octave: 48
  n_octaves: 6
  fmin: 48.9994

model:
  h_dim: 128
  conv_channels: 32
  num_cycles: 2
  num_transformer_layers: 1
  nhead_fh: 8
  nhead_ht: 8
  nhead_tf: 6
  dim_feedforward: 512
  dropout: 0.1
  num_pitches: 48
  d_model: 256

training:
  batch_size: 16
  num_workers: 4
  learning_rate: 0.0003
  weight_decay: 0.01
  epochs: 300
  save_dir: "./checkpoints"
  log_dir: "./logs"
  save_every: 10
  grad_clip: 1.0
  warmup_epochs: 10

loss:
  onset_weight: 1.0
  offset_weight: 1.0
  frame_weight: 1.0
